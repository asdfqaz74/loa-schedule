<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>로스트아크 스케줄러</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&amp;family=Manrope:wght@400&amp;family=Sora:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#3f4753",
                        "on-secondary-fixed-variant": "#5c4205",
                        "tertiary": "#c7cfdd",
                        "surface-tint": "#e9c07c",
                        "surface-elevated": "#1C222B",
                        "surface-container-lowest": "#0b0e11",
                        "on-tertiary-fixed": "#141c27",
                        "secondary-container": "#5f4507",
                        "surface-dim": "#111417",
                        "primary": "#f2c883",
                        "on-secondary": "#412d00",
                        "status-completed": "#4ADE80",
                        "outline": "#9a8f80",
                        "on-surface-variant": "#d1c5b4",
                        "secondary-fixed-dim": "#e7c17a",
                        "primary-fixed-dim": "#e9c07c",
                        "surface-container-low": "#191c1f",
                        "inverse-primary": "#78591f",
                        "tertiary-container": "#abb3c1",
                        "error-container": "#93000a",
                        "primary-container": "#d4ad6a",
                        "surface-variant": "#323538",
                        "deep-border": "#2D3748",
                        "background": "#111417",
                        "primary-fixed": "#ffdea9",
                        "tertiary-fixed-dim": "#bfc7d6",
                        "secondary-fixed": "#ffdea4",
                        "surface-bright": "#37393d",
                        "error": "#ffb4ab",
                        "inverse-on-surface": "#2e3134",
                        "secondary": "#e7c17a",
                        "on-primary-fixed": "#271900",
                        "status-not-participating": "#F87171",
                        "surface": "#111417",
                        "on-primary-container": "#5b4005",
                        "surface-container-highest": "#323538",
                        "outline-variant": "#4e4639",
                        "on-primary": "#422c00",
                        "status-scheduled": "#8493A8",
                        "on-secondary-container": "#d8b36d",
                        "on-secondary-fixed": "#261900",
                        "tertiary-fixed": "#dbe3f2",
                        "surface-container-high": "#272a2e",
                        "on-surface": "#e1e2e7",
                        "inverse-surface": "#e1e2e7",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e1e2e7",
                        "on-tertiary-container": "#3d4551",
                        "on-error": "#690005",
                        "gold-shimmer": "#F3E5AB",
                        "surface-container": "#1d2023",
                        "on-tertiary": "#29313c",
                        "surface-base": "#12161C",
                        "on-primary-fixed-variant": "#5d4207"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "gutter": "24px",
                        "margin-desktop": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "label-sm": ["JetBrains Mono"],
                        "headline-xl": ["Sora"],
                        "label-md": ["JetBrains Mono"],
                        "headline-lg-mobile": ["Sora"],
                        "headline-lg": ["Sora"],
                        "body-lg": ["Manrope"],
                        "body-sm": ["Manrope"],
                        "headline-md": ["Sora"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "500" }],
                        "headline-xl": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.25", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .shimmer-bg {
            background: linear-gradient(90deg, rgba(212,173,106,0) 0%, rgba(212,173,106,0.1) 50%, rgba(212,173,106,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .minted-shadow {
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 14px 0 rgba(212,173,106,0.2);
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-primary selection:text-on-primary py-12">
<!-- Atmospheric Background Layer -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-surface-container-lowest via-background to-surface-container-lowest z-10 opacity-90"></div>
<div class="absolute inset-0 bg-cover bg-center opacity-30 mix-blend-luminosity" data-alt="A dark, atmospheric fantasy landscape featuring ancient metallic ruins subtly illuminated by a cold, distant nebula. The scene is enveloped in deep, layered shadows of navy and black, with faint, ethereal golden dust motes floating in the foreground. The lighting is moody and cinematic, emphasizing a vast, minimalist void that feels both ancient and highly structured. The visual style is a sophisticated blend of high-fantasy and clean, dark-mode corporate aesthetics." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBhprht82rwtciteEGCmxv-mKhQe0ehWRDHGN0uAqphhyqv1yWGwnPVmN5Yl5CV9BMExRAYPZf9WW1C65Wcd-Ijn5unlXwnNpkALsfrYZg1oAEBOtQgo05goM8ZuJDRqXLIs63td-HZDw9Vak_oRDexj7bN6ArpSKYEcMROZp69ZKd4RcxSNWtwzOw9Z0M62a4H_qwfdXQNWkj26isBbbP-kg-wVx_EZmq4teyKiGe5g_Dxe4ASlt8S72CnRXqYZWoLgBXSQHPeVyEB')"></div>
<!-- Ethereal Glows -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[100px] z-10 pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-tertiary/5 rounded-full blur-[100px] z-10 pointer-events-none"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-20 w-full max-w-[480px] px-margin-mobile flex flex-col items-center">
<!-- Hero Section -->
<div class="text-center mb-10 flex flex-col items-center">
<div class="w-16 h-16 rounded-full bg-surface-base border border-deep-border flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(212,173,106,0.1)] relative">
<div class="absolute inset-0 rounded-full shimmer-bg pointer-events-none"></div>
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
</div>
<h1 class="text-headline-xl font-headline-xl text-on-surface mb-3 tracking-tight">로스트아크 스케줄러</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant max-w-sm">지인들과 함께 레이드 일정을 관리하세요.</p>
</div>
<!-- Join Room Card -->
<div class="w-full glass-panel bg-surface-base/80 border border-deep-border rounded-xl p-6 sm:p-8 flex flex-col gap-5 relative group transition-colors duration-300 hover:border-outline-variant">
<div class="absolute -inset-[1px] rounded-xl bg-gradient-to-r from-primary/0 via-primary/10 to-primary/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
<div class="flex flex-col gap-2">
<label class="text-label-sm font-label-sm text-on-surface-variant uppercase" for="room_code">Room Access Code</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">key</span>
<input class="w-full bg-surface-dim border border-deep-border text-on-surface focus:border-primary focus:ring-1 focus:ring-primary rounded-lg py-3 pl-10 pr-4 outline-none text-body-md font-body-md placeholder-on-surface-variant/50 transition-all duration-200" id="room_code" placeholder="방 코드를 입력하세요" type="text"/>
</div>
</div>
<button class="w-full bg-surface-elevated border border-outline text-primary hover:border-primary hover:bg-surface-bright rounded-lg py-3.5 px-4 font-bold text-label-md font-label-md transition-all duration-200 flex items-center justify-center gap-2 group/btn" type="button">
<span>방 입장</span>
<span class="material-symbols-outlined text-[18px] group-hover/btn:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 w-full my-8 opacity-60">
<div class="flex-1 h-px bg-gradient-to-r from-transparent to-deep-border"></div>
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest">OR</span>
<div class="flex-1 h-px bg-gradient-to-l from-transparent to-deep-border"></div>
</div>
<!-- Create Room Card -->
<div class="w-full glass-panel bg-surface-base/80 border border-deep-border rounded-xl p-6 sm:p-8 flex flex-col gap-5 relative group transition-colors duration-300 hover:border-outline-variant">
<div class="absolute -inset-[1px] rounded-xl bg-gradient-to-r from-primary/0 via-primary/10 to-primary/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<h2 class="text-body-lg font-body-lg text-primary font-bold">새 스케줄러 방 만들기</h2>
</div>
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-2">
<label class="text-label-sm font-label-sm text-on-surface-variant uppercase" for="room_name">Room Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">badge</span>
<input class="w-full bg-surface-dim border border-deep-border text-on-surface focus:border-primary focus:ring-1 focus:ring-primary rounded-lg py-3 pl-10 pr-4 outline-none text-body-md font-body-md placeholder-on-surface-variant/50 transition-all duration-200" id="room_name" placeholder="방 이름을 입력하세요" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-label-sm font-label-sm text-on-surface-variant uppercase" for="max_members">Max Members</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">group</span>
<input class="w-full bg-surface-dim border border-deep-border text-on-surface focus:border-primary focus:ring-1 focus:ring-primary rounded-lg py-3 pl-10 pr-4 outline-none text-body-md font-body-md placeholder-on-surface-variant/50 transition-all duration-200" id="max_members" max="30" min="1" placeholder="최대 참여 인원 (예: 8)" type="number"/>
</div>
<p class="text-label-sm font-label-sm text-on-surface-variant/60 ml-1">스케줄러에 참여할 수 있는 최대 인원을 설정합니다.</p>
</div>
<button class="w-full bg-primary-container text-on-primary-container rounded-lg py-4 px-6 font-bold text-label-md font-label-md hover:brightness-110 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3 minted-shadow relative overflow-hidden group mt-2" type="button">
<div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] pointer-events-none"></div>
<span>방 생성하기</span>
<span class="material-symbols-outlined text-[18px]">check</span>
</button>
</div>
</div>
<!-- Footer Info -->
<div class="mt-8 text-center max-w-sm flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant/50 text-xl">info</span>
<p class="text-body-sm font-body-sm text-on-surface-variant/80 leading-relaxed">
                방 코드를 공유하면 친구들도 같은 스케줄러에 참여할 수 있습니다.
            </p>
</div>
</main>
</body></html>
